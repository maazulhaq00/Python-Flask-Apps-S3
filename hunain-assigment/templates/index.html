{% extends "layout.html" %}

  {% block content %}
<table class="table">
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Price</th>
      <th scope="col">Descriptions</th>
    </tr>
  </thead>
  <tbody>
    {% for pro in products %}
    <tr>
      <td>{{pro.name}}</td>
      <td>{{pro.price}}</td>
      <td>{{pro.description}}</td>
      <td>
        <a href="{{url_for('deleteproduct', id=pro._id)}}">Delete</a>
        <a href="{{url_for('editproduct', id=pro._id)}}">Edit</a>
      </td>
    </tr>
   {% endfor %}
  </tbody>
</table>
    {% endblock %}
