{% extends 'layout.html' %}


{% block content %}
<h3>Edit Student</h3>
<form method="post" action="{{url_for('editstudent', id=student._id)}}" class="mt-4">
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{student.name}}">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{student.email}}">
    </div>
    <div class="mb-3">
        <label for="contact" class="form-label">Contact</label>
        <input type="text" class="form-control" id="contact" name="contact" value="{{student.contact}}">
    </div>
    <div class="mb-3">
        <label for="course" class="form-label">Course Enrolled</label>
        <input type="text" class="form-control" id="course" name="course" value="{{student.course}}">
    </div>

    <button type="submit" class="btn btn-dark">Update</button>
</form>

{% endblock %}
