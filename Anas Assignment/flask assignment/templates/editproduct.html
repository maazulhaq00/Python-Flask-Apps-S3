{% extends 'layout.html' %}

{% block content %}

<h3>Edit Product</h3>

<form method="post" action="{{ url_for('editproduct', id=p._id) }}" class="mt-2">

    <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ p.name }}">
    </div>

    <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="text" class="form-control" id="price" name="price" value="{{ p.price }}">
    </div>

    <div class="mb-3">
        <label for="quantity" class="form-label">Quantity</label>
        <input type="text" class="form-control" id="quantity" name="quantity" value="{{ p.quantity }}">
    </div>

    <button type="submit" class="btn btn-dark">Update Product</button>

</form>

{% endblock %}
