{% extends 'layout.html' %}

{% block content %}

<div class="container">

    <div class="row">
        <div class="col-lg-12">
            <h1>Product Data</h1>
            <a href="{{ url_for('addproduct') }}" class="btn btn-dark mb-2">Add Product</a>
        </div>

        <div class="col-lg-12">
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Name</th>
                        <th scope="col">Price</th>
                        <th scope="col">Quantity</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for p in product_list %}
                    <tr>
                        <th scope="row">1</th>
                        <td>{{ p.name }}</td>
                        <td>{{ p.price }}</td>
                        <td>{{ p.quantity }}</td>
                        <td>
                            <a href="{{ url_for('editproduct', id=p._id) }}">Edit</a>
                            <a href="{{ url_for('deleteproduct', id=p._id) }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>

</div>

{% endblock %}
